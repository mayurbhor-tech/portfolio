<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYUR BHOR // SYSTEM ACCESS v3.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ROOT VARIABLES
============================================================ */
:root {

 --green: #00ff41;
  --green-dim: #00c832;
  --green-glow: rgba(0,255,65,0.15);
  --red: #ff0040;
  --cyan: #00f0ff;
  --yellow: #ffe600;
  --dark: #020c02;
  --dark2: #040f04;
  --panel: rgba(0,255,65,0.04);
  --border: rgba(0,255,65,0.18);
  --text: #b8ffca;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  overflow-x: hidden;
  cursor: none; /* custom cursor */
}

/* ============================================================
   CUSTOM CURSOR
============================================================ */
#cursor-outer {
  position: fixed;
  width: 38px; height: 38px;
  border: 2px solid var(--green);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  transition: width 0.2s, height 0.2s, border-color 0.2s, opacity 0.2s;
  box-shadow: 0 0 10px var(--green), inset 0 0 6px rgba(0,255,65,0.1);
  mix-blend-mode: screen;
}
cursor-inner {
  position: fixed;
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 8px var(--green), 0 0 16px var(--green);
  transition: width 0.15s, height 0.15s, background 0.15s;
}

/* crosshair lines */
#cursor-outer::before,
#cursor-outer::after {
  content: '';
  position: absolute;
  background: var(--green);
  opacity: 0.6;
}
#cursor-outer::before {
  width: 1px; height: 10px;
  left: 50%; top: -14px;
  transform: translateX(-50%);
  box-shadow: 0 28px 0 var(--green);
}
#cursor-outer::after {
  width: 10px; height: 1px;
  top: 50%; left: -14px;
  transform: translateY(-50%);
  box-shadow: 28px 0 0 var(--green);
}

body:has(a:hover) #cursor-outer,
body:has(button:hover) #cursor-outer {
  width: 52px; height: 52px;
  border-color: var(--cyan);
  box-shadow: 0 0 20px var(--cyan);
}
body:has(a:hover) #cursor-inner,
body:has(button:hover) #cursor-inner {
  background: var(--cyan);
  box-shadow: 0 0 12px var(--cyan);
  width: 10px; height: 10px;
}

/* cursor scan rotate */

* cursor scan rotate */
#cursor-outer {
  animation: cursor-rotate 4s linear infinite;
}
@keyframes cursor-rotate {
  from { --rot: 0deg; }
  to   { --rot: 360deg; }
}

/* ============================================================
   BACKGROUND LAYERS
============================================================ */
#matrix-canvas {
  position: fixed; top:0; left:0;
  width:100%; height:100%;
  z-index:0; opacity:0.09;
  pointer-events:none;
}

/* scanlines */
body::before {
  content:''; position:fixed; top:0; left:0; width:100%; height:100%;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  z-index:1; pointer-events:none;
}

/* vignette */
body::after {
  content:''; position:fixed; top:0; left:0; width:100%; height:100%;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
  z-index:1; pointer-events:none;
}

/* ============================================================
   NAV
============================================================ */
   nav {
  position:fixed; top:0; width:100%;
  z-index:1000;
  background: rgba(2,12,2,0.93);
  border-bottom:1px solid var(--border);
  backdrop-filter: blur(8px);
  padding: 0 6%;
  display:flex; justify-content:space-between; align-items:center;
  height:60px;
}

.nav-logo {
  font-family:'Orbitron',monospace; font-weight:900; font-size:1rem;
  color:var(--green); text-shadow:0 0 12px var(--green); letter-spacing:3px;
}
.nav-logo span { color:var(--red); }

nav ul { display:flex; gap:24px; list-style:none; }
nav a {
  color:var(--text); text-decoration:none; font-size:0.7rem;
  letter-spacing:1.5px; text-transform:uppercase; transition:0.2s; position:relative;
}
nav a::after {
  content:''; position:absolute; bottom:-3px; left:0;
  width:0; height:1px; background:var(--green);
  box-shadow:0 0 6px var(--green); transition:0.3s;
}
nav a:hover { color:var(--green); text-shadow:0 0 8px var(--green); }
nav a:hover::after { width:100%; }

.nav-status {
  display:flex; align-items:center; gap:6px;
  font-size:0.68rem; color:var(--green-dim);
}
.status-dot {
  width:7px; height:7px; background:var(--green);
  border-radius:50%; box-shadow:0 0 8px var(--green);
  animation:blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
