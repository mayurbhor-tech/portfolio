<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYUR BHOR // SYSTEM ACCESS v3.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ROOT VARIABLES
============================================================ */
:root {

 --green: #00ff41;
  --green-dim: #00c832;
  --green-glow: rgba(0,255,65,0.15);
  --red: #ff0040;
  --cyan: #00f0ff;
  --yellow: #ffe600;
  --dark: #020c02;
  --dark2: #040f04;
  --panel: rgba(0,255,65,0.04);
  --border: rgba(0,255,65,0.18);
  --text: #b8ffca;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  overflow-x: hidden;
  cursor: none; /* custom cursor */
}

/* ============================================================
   CUSTOM CURSOR
============================================================ */
#cursor-outer {
  position: fixed;
  width: 38px; height: 38px;
  border: 2px solid var(--green);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  transition: width 0.2s, height 0.2s, border-color 0.2s, opacity 0.2s;
  box-shadow: 0 0 10px var(--green), inset 0 0 6px rgba(0,255,65,0.1);
  mix-blend-mode: screen;
}
cursor-inner {
  position: fixed;
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 8px var(--green), 0 0 16px var(--green);
  transition: width 0.15s, height 0.15s, background 0.15s;
}

/* crosshair lines */
#cursor-outer::before,
#cursor-outer::after {
  content: '';
  position: absolute;
  background: var(--green);
  opacity: 0.6;
}
#cursor-outer::before {
  width: 1px; height: 10px;
  left: 50%; top: -14px;
  transform: translateX(-50%);
  box-shadow: 0 28px 0 var(--green);
}
#cursor-outer::after {
  width: 10px; height: 1px;
  top: 50%; left: -14px;
  transform: translateY(-50%);
  box-shadow: 28px 0 0 var(--green);
}

body:has(a:hover) #cursor-outer,
body:has(button:hover) #cursor-outer {
  width: 52px; height: 52px;
  border-color: var(--cyan);
  box-shadow: 0 0 20px var(--cyan);
}
body:has(a:hover) #cursor-inner,
body:has(button:hover) #cursor-inner {
  background: var(--cyan);
  box-shadow: 0 0 12px var(--cyan);
  width: 10px; height: 10px;
}

/* cursor scan rotate */

* cursor scan rotate */
#cursor-outer {
  animation: cursor-rotate 4s linear infinite;
}
@keyframes cursor-rotate {
  from { --rot: 0deg; }
  to   { --rot: 360deg; }
}

/* ============================================================
   BACKGROUND LAYERS
============================================================ */
#matrix-canvas {
  position: fixed; top:0; left:0;
  width:100%; height:100%;
  z-index:0; opacity:0.09;
  pointer-events:none;
}

/* scanlines */
body::before {
  content:''; position:fixed; top:0; left:0; width:100%; height:100%;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  z-index:1; pointer-events:none;
}

/* vignette */
body::after {
  content:''; position:fixed; top:0; left:0; width:100%; height:100%;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
  z-index:1; pointer-events:none;
}

/* ============================================================
   NAV
============================================================ */
   nav {
  position:fixed; top:0; width:100%;
  z-index:1000;
  background: rgba(2,12,2,0.93);
  border-bottom:1px solid var(--border);
  backdrop-filter: blur(8px);
  padding: 0 6%;
  display:flex; justify-content:space-between; align-items:center;
  height:60px;
}

.nav-logo {
  font-family:'Orbitron',monospace; font-weight:900; font-size:1rem;
  color:var(--green); text-shadow:0 0 12px var(--green); letter-spacing:3px;
}
.nav-logo span { color:var(--red); }

nav ul { display:flex; gap:24px; list-style:none; }
nav a {
  color:var(--text); text-decoration:none; font-size:0.7rem;
  letter-spacing:1.5px; text-transform:uppercase; transition:0.2s; position:relative;
}
nav a::after {
  content:''; position:absolute; bottom:-3px; left:0;
  width:0; height:1px; background:var(--green);
  box-shadow:0 0 6px var(--green); transition:0.3s;
}
nav a:hover { color:var(--green); text-shadow:0 0 8px var(--green); }
nav a:hover::after { width:100%; }

.nav-status {
  display:flex; align-items:center; gap:6px;
  font-size:0.68rem; color:var(--green-dim);
}
.status-dot {
  width:7px; height:7px; background:var(--green);
  border-radius:50%; box-shadow:0 0 8px var(--green);
  animation:blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
   /* ============================================================
   HERO
============================================================ */
.hero {
  position:relative; z-index:2;
  min-height:100vh; display:flex;
  align-items:center; justify-content:center;
  padding:100px 6% 60px; overflow:hidden;
}

.hero-grid-bg {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(0,255,65,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,65,0.05) 1px, transparent 1px);
  background-size:50px 50px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  animation: grid-pulse 4s ease-in-out infinite alternate;
}
@keyframes grid-pulse { from{opacity:0.7} to{opacity:1.2} }

.hero-corner {
  position:absolute; width:160px; height:160px;
  border-color:var(--green); border-style:solid; opacity:0.35;
  animation: corner-pulse 2s ease-in-out infinite alternate;
}
.hero-corner.tl { top:80px; left:5%; border-width:2px 0 0 2px; }
.hero-corner.br { bottom:30px; right:5%; border-width:0 2px 2px 0; }
.hero-corner.tr { top:80px; right:5%; border-width:2px 2px 0 0; opacity:0.15; }
.hero-corner.bl { bottom:30px; left:5%; border-width:0 0 2px 2px; opacity:0.15; }
@keyframes corner-pulse { from{opacity:0.2} to{opacity:0.5} }

/* animated hex decorations */
.hex-deco {
  position:absolute; opacity:0.06; pointer-events:none;
  animation: hex-float 8s ease-in-out infinite;
}
.hex-deco:nth-child(odd) { animation-direction: alternate; }
@keyframes hex-float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%     { transform: translateY(-20px) rotate(180deg); }
}

.hero-inner {
  max-width:900px; text-align:center;
  position:relative; z-index:2;
}

.boot-text {
  font-size:0.72rem; color:var(--green-dim);
  letter-spacing:2px; margin-bottom:30px;
  opacity:0; animation:fade-in 0.5s 0.2s forwards;
}
.boot-text span { color:var(--green); }
@keyframes fade-in { to{opacity:1} }

.hero-tag {
  display:inline-block; border:1px solid var(--red); color:var(--red);
  font-size:0.65rem; letter-spacing:3px; padding:4px 14px;
  margin-bottom:22px; text-transform:uppercase;
  opacity:0; animation:fade-in 0.5s 0.5s forwards;
  box-shadow:0 0 12px rgba(255,0,64,0.2);
}

.hero h1 {
  font-family:'Orbitron',monospace; font-size:clamp(2.8rem,7vw,5.5rem);
  font-weight:900; color:var(--green);
  text-shadow:0 0 30px rgba(0,255,65,0.5),0 0 60px rgba(0,255,65,0.2);
  letter-spacing:4px; line-height:1.05;
  opacity:0; animation:glitch-in 0.6s 0.8s forwards;
}
@keyframes glitch-in {
  0%{opacity:0;transform:translateX(-4px);filter:blur(4px)}
  40%{opacity:1;transform:translateX(2px);filter:blur(0)}
  60%{transform:translateX(-1px)} 80%{transform:translateX(1px)}
  100%{opacity:1;transform:translateX(0)}
}
.hero h1 .slash { color:var(--red); }
.hero h1:hover { animation: glitch-loop 0.4s steps(2) infinite; }
@keyframes glitch-loop {
  0%{text-shadow:3px 0 var(--red),-3px 0 var(--cyan),0 0 30px var(--green)}
  25%{text-shadow:-3px 0 var(--red),3px 0 var(--cyan)}
  50%{text-shadow:3px 2px var(--red),-3px -2px var(--cyan)}
  75%{text-shadow:-3px 2px var(--red),3px -2px var(--cyan)}
  100%{text-shadow:3px 0 var(--red),-3px 0 var(--cyan)}
}

.hero-subtitle {
  font-family:'Exo 2',sans-serif; font-size:1rem; font-weight:300;
  color:var(--cyan); letter-spacing:3px; text-transform:uppercase;
  margin:16px 0 10px;
  opacity:0; animation:fade-in 0.5s 1.3s forwards;
}

.typewriter-wrap {
  font-size:0.82rem; color:var(--green-dim);
  margin:18px 0 36px; min-height:5em; line-height:1.8;
  opacity:0; animation:fade-in 0.5s 1.6s forwards;
  text-align:left; display:inline-block;
}
.typewriter-wrap .cur {
  display:inline-block; width:8px; height:1em;
  background:var(--green); vertical-align:middle;
  animation:blink 0.8s infinite; margin-left:2px;
}

.hero-btns {
  display:flex; gap:16px; justify-content:center; flex-wrap:wrap;
  opacity:0; animation:fade-in 0.5s 2s forwards;
}

.btn {
  font-family:'Share Tech Mono',monospace; font-size:0.75rem;
  letter-spacing:2px; text-transform:uppercase;
  padding:12px 28px; border-radius:2px;
  text-decoration:none; transition:0.25s;
  position:relative; overflow:hidden; cursor:none;
}
